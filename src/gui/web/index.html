<!DOCTYPE html>
<html lang="vi">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Agent</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:ital,wght@0,400;0,500;0,600;1,400&family=Sora:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/tokyo-night-dark.min.css">
<script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/marked/9.1.6/marked.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg-base:#0a0c12;--bg-surface:#10131d;--bg-panel:#14182a;--bg-input:#191e30;--bg-hover:#1e2438;
  --border:rgba(255,255,255,0.055);--border-accent:rgba(255,255,255,0.11);
  --text-primary:#e6e9f2;--text-secondary:#8890aa;--text-dim:#414a66;
  --amber:#f0a500;--amber-soft:rgba(240,165,0,0.1);--amber-glow:rgba(240,165,0,0.22);
  --cyan:#00c8e8;--cyan-soft:rgba(0,200,232,0.09);
  --green:#00e06e;--green-soft:rgba(0,224,110,0.09);
  --red:#ff4d5e;--red-soft:rgba(255,77,94,0.09);
  --violet:#a78bfa;--violet-soft:rgba(167,139,250,0.09);
  --blue:#4d91ff;--blue-soft:rgba(77,145,255,0.09);
  --sidebar-w:268px;
  --header-h:54px;
  --font-ui:'Sora',sans-serif;--font-mono:'IBM Plex Mono',monospace;
  --radius:12px;
}
html,body{height:100%;overflow:hidden}
body{font-family:var(--font-ui);background:var(--bg-base);color:var(--text-primary);display:flex}

/* ━━ SIDEBAR ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#sidebar{
  width:var(--sidebar-w);flex-shrink:0;background:var(--bg-surface);
  border-right:1px solid var(--border);display:flex;flex-direction:column;
  transition:margin-left .28s cubic-bezier(.4,0,.2,1);z-index:20;
}
#sidebar.collapsed{margin-left:calc(-1 * var(--sidebar-w))}

.sb-top{padding:14px 12px 10px;flex-shrink:0}
.new-chat-btn{
  width:100%;display:flex;align-items:center;gap:10px;
  background:var(--amber);color:#000;border:none;border-radius:9px;
  padding:10px 14px;font-family:var(--font-ui);font-size:13.5px;font-weight:600;
  cursor:pointer;transition:all .2s;letter-spacing:-.2px;
}
.new-chat-btn:hover{background:#ffb400;transform:translateY(-1px);box-shadow:0 4px 18px var(--amber-glow)}
.new-chat-btn svg{flex-shrink:0}

.sb-search{
  margin-top:8px;position:relative;
}
.sb-search input{
  width:100%;background:var(--bg-panel);border:1px solid var(--border);border-radius:7px;
  padding:7px 10px 7px 32px;color:var(--text-primary);font-family:var(--font-ui);font-size:12.5px;
  outline:none;transition:border-color .2s;
}
.sb-search input:focus{border-color:rgba(240,165,0,.35)}
.sb-search input::placeholder{color:var(--text-dim)}
.sb-search-icon{position:absolute;left:9px;top:50%;transform:translateY(-50%);color:var(--text-dim);font-size:13px;pointer-events:none}

.session-list{flex:1;overflow-y:auto;padding:4px 0 16px}
.session-list::-webkit-scrollbar{width:3px}
.session-list::-webkit-scrollbar-thumb{background:var(--border-accent);border-radius:2px}

.date-label{
  padding:10px 14px 4px;font-size:10.5px;font-family:var(--font-mono);
  color:var(--text-dim);letter-spacing:.5px;text-transform:uppercase;
}
.session-item{
  display:flex;align-items:center;gap:9px;padding:8px 12px;margin:1px 8px;
  border-radius:8px;cursor:pointer;transition:background .15s;position:relative;group:true;
}
.session-item:hover{background:var(--bg-hover)}
.session-item.active{background:var(--amber-soft);border:1px solid rgba(240,165,0,.18)}
.session-item.active .si-name{color:var(--amber)}
.si-icon{font-size:14px;flex-shrink:0;opacity:.7}
.si-info{flex:1;min-width:0}
.si-name{font-size:12.5px;font-weight:500;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;color:var(--text-primary);line-height:1.35}
.si-meta{font-size:10.5px;color:var(--text-dim);font-family:var(--font-mono);margin-top:1px}
.si-del{
  opacity:0;width:22px;height:22px;border-radius:5px;border:none;background:transparent;
  color:var(--text-dim);cursor:pointer;font-size:12px;display:grid;place-items:center;flex-shrink:0;
  transition:all .15s;
}
.session-item:hover .si-del{opacity:1}
.si-del:hover{background:var(--red-soft);color:var(--red)}

.sb-footer{padding:10px 12px;border-top:1px solid var(--border);flex-shrink:0}
.sb-history-badge{
  display:flex;align-items:center;gap:6px;font-size:10.5px;font-family:var(--font-mono);
  color:var(--text-dim);
}
.history-dot{width:5px;height:5px;border-radius:50%;background:var(--text-dim)}
.history-dot.active{background:var(--green);box-shadow:0 0 6px var(--green)}

/* ━━ MAIN AREA ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#main{flex:1;display:flex;flex-direction:column;overflow:hidden;min-width:0}

/* Header */
#header{
  height:var(--header-h);background:var(--bg-panel);border-bottom:1px solid var(--border);
  display:flex;align-items:center;padding:0 16px;gap:12px;flex-shrink:0;z-index:10;
}
.sidebar-toggle{
  width:32px;height:32px;background:transparent;border:1px solid var(--border);border-radius:7px;
  display:grid;place-items:center;cursor:pointer;color:var(--text-secondary);
  font-size:16px;transition:all .2s;flex-shrink:0;
}
.sidebar-toggle:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-accent)}
.logo{display:flex;align-items:center;gap:9px;font-weight:700;font-size:15px;letter-spacing:-.3px}
.logo-icon{
  width:28px;height:28px;background:linear-gradient(135deg,var(--amber),#b85800);
  border-radius:7px;display:grid;place-items:center;font-size:13px;
  box-shadow:0 0 14px var(--amber-glow);flex-shrink:0;
}
.logo-text span{color:var(--amber)}
.session-title{
  font-size:12px;font-family:var(--font-mono);color:var(--text-dim);
  max-width:240px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;
}
.spacer{flex:1}
.mode-group{display:flex;background:var(--bg-input);border:1px solid var(--border);border-radius:6px;overflow:hidden}
.mode-btn{
  padding:5px 11px;font-size:10.5px;font-family:var(--font-mono);font-weight:500;
  color:var(--text-secondary);background:transparent;border:none;cursor:pointer;
  transition:all .18s;letter-spacing:.3px;
}
.mode-btn:hover{color:var(--text-primary);background:var(--bg-hover)}
.mode-btn.active{background:var(--amber);color:#000;font-weight:700}
.ws-status{display:flex;align-items:center;gap:6px;font-size:10.5px;font-family:var(--font-mono);color:var(--text-dim)}
.ws-dot{width:6px;height:6px;border-radius:50%;background:var(--red);transition:background .3s;flex-shrink:0}
.ws-dot.connected{background:var(--green);box-shadow:0 0 7px var(--green)}
.ws-dot.connecting{background:var(--amber);animation:pulse .9s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
.icon-btn{
  width:30px;height:30px;background:var(--bg-input);border:1px solid var(--border);
  border-radius:6px;display:grid;place-items:center;cursor:pointer;
  color:var(--text-secondary);font-size:13px;transition:all .18s;
}
.icon-btn:hover{background:var(--bg-hover);color:var(--text-primary);border-color:var(--border-accent)}
.icon-btn.danger:hover{border-color:rgba(255,77,94,.4);color:var(--red)}

/* ━━ CHAT AREA ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#chat-area{flex:1;display:flex;flex-direction:column;overflow:hidden}
#messages{flex:1;overflow-y:auto;padding:20px 0 10px;scroll-behavior:smooth}
#messages::-webkit-scrollbar{width:4px}
#messages::-webkit-scrollbar-thumb{background:var(--border-accent);border-radius:2px}

/* Empty state */
#empty-state{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  height:100%;gap:20px;padding:24px;
}
.es-icon{
  width:72px;height:72px;background:linear-gradient(135deg,var(--amber-soft),rgba(240,165,0,.05));
  border:1px solid rgba(240,165,0,.2);border-radius:20px;display:grid;place-items:center;
  font-size:32px;box-shadow:0 0 40px var(--amber-glow);
}
.es-title{font-size:22px;font-weight:700;color:var(--text-primary);letter-spacing:-.5px}
.es-sub{font-size:13px;color:var(--text-secondary);text-align:center;max-width:320px;line-height:1.6}
.es-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;max-width:420px}
.es-chip{
  background:var(--bg-panel);border:1px solid var(--border-accent);border-radius:20px;
  padding:7px 14px;font-size:12px;color:var(--text-secondary);cursor:pointer;
  transition:all .2s;
}
.es-chip:hover{border-color:rgba(240,165,0,.4);color:var(--amber);background:var(--amber-soft)}

/* ━━ MESSAGE ROW ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.msg-row{
  display:flex;padding:4px 20px;gap:11px;max-width:820px;margin:0 auto;
  width:100%;animation:fadeUp .26s ease;
}
@keyframes fadeUp{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.msg-row.user{flex-direction:row-reverse}
.msg-row.historical{animation:none}
.avatar{
  width:30px;height:30px;border-radius:9px;display:grid;place-items:center;
  font-size:13px;flex-shrink:0;margin-top:2px;
}
.avatar.ai{background:linear-gradient(135deg,var(--amber),#b85800);box-shadow:0 0 10px var(--amber-glow)}
.avatar.user{background:var(--bg-panel);border:1px solid var(--border-accent);font-size:12px}
.bubble{max-width:82%;display:flex;flex-direction:column;gap:7px;min-width:0}

/* Message actions bar */
.msg-actions{
  display:flex;gap:4px;opacity:0;transition:opacity .15s;margin-top:2px;
}
.msg-row:hover .msg-actions{opacity:1}
.msg-row.user .msg-actions{justify-content:flex-end}
.act-btn{
  display:flex;align-items:center;gap:4px;padding:3px 8px;border-radius:5px;
  background:var(--bg-panel);border:1px solid var(--border);
  color:var(--text-dim);font-size:10.5px;font-family:var(--font-mono);
  cursor:pointer;transition:all .15s;
}
.act-btn:hover{background:var(--bg-hover);color:var(--text-secondary);border-color:var(--border-accent)}
.act-btn.copied{border-color:var(--green);color:var(--green)}
.msg-ts{font-size:10px;font-family:var(--font-mono);color:var(--text-dim);padding:0 2px}

/* Thinking block */
.think-block{
  background:var(--amber-soft);border:1px solid rgba(240,165,0,.18);
  border-radius:10px;overflow:hidden;font-family:var(--font-mono);font-size:12.5px;
}
.think-header{
  display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;
  user-select:none;color:var(--amber);font-weight:500;transition:background .18s;
}
.think-header:hover{background:rgba(240,165,0,.07)}

/* ━━ THINKING BLOCK ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
.think-block{
  background:var(--bg-panel);border:1px solid rgba(240,165,0,.18);
  border-radius:10px;overflow:hidden;font-family:var(--font-mono);font-size:12.5px;
  margin-bottom:6px;
}
.think-header{
  display:flex;align-items:center;gap:8px;padding:8px 12px;cursor:pointer;
  user-select:none;color:var(--amber);font-weight:500;transition:background .18s;
}
.think-header:hover{background:rgba(240,165,0,.06)}
.think-spinner{
  width:12px;height:12px;border:1.5px solid rgba(240,165,0,.3);border-top-color:var(--amber);
  border-radius:50%;animation:spin .8s linear infinite;flex-shrink:0;
  display:flex;align-items:center;justify-content:center;
}
@keyframes spin{to{transform:rotate(360deg)}}
.think-spinner.done{animation:none;border-color:transparent;color:var(--amber);font-size:11px;font-weight:bold}
.think-spinner.done::before{content:'✓'}
.think-label{flex:1;font-size:10.5px;letter-spacing:.3px}
.think-chevron{font-size:9px;transition:transform .22s;color:var(--amber)}
.think-block.collapsed .think-chevron{transform:rotate(-90deg)}
.think-body{
  padding:0 0 8px;
  border-top:1px solid rgba(240,165,0,.1);
  max-height:360px;overflow-y:auto;
  transition:max-height .3s ease,padding .3s ease;
}
.think-block.collapsed .think-body{max-height:0;padding:0;border-top-color:transparent;overflow:hidden}
.think-body::-webkit-scrollbar{width:3px}
.think-body::-webkit-scrollbar-thumb{background:rgba(240,165,0,.25);border-radius:2px}

/* Cursor nhấp nháy cho thinking stream */
.think-cursor{display:inline-block;width:6px;height:12px;background:var(--amber);
  margin-left:3px;vertical-align:middle;animation:blink .7s step-end infinite;border-radius:1px}

/* ── Trace log entries ── */
.tlog-section{padding:8px 12px 0;display:flex;flex-direction:column;gap:4px}
.tlog-entry{
  display:flex;align-items:flex-start;gap:8px;
  padding:6px 10px;border-radius:7px;
  background:var(--bg-surface);border:1px solid var(--border);
  animation:fadeUp .18s ease;
}
.tlog-badge{
  display:inline-flex;align-items:center;gap:4px;
  padding:2px 7px;border-radius:4px;font-size:9.5px;font-weight:700;
  letter-spacing:.4px;flex-shrink:0;margin-top:1px;
}
.tlog-badge.start{background:var(--green-soft);color:var(--green)}
.tlog-badge.metric{background:var(--blue-soft);color:var(--blue)}
.tlog-badge.tool{background:var(--violet-soft);color:var(--violet)}
.tlog-badge.end{background:var(--cyan-soft);color:var(--cyan)}
.tlog-body{flex:1;min-width:0}
.tlog-title{font-size:11px;color:var(--text-secondary);font-weight:600;margin-bottom:2px}
.tlog-meta{font-size:10px;color:var(--text-dim);line-height:1.6}
.tlog-meta b{color:var(--text-secondary)}
.tlog-preview{
  font-size:10px;color:var(--text-dim);line-height:1.5;
  white-space:pre-wrap;word-break:break-all;
  max-height:48px;overflow:hidden;margin-top:2px;
}
.tlog-stats{
  display:flex;gap:10px;flex-wrap:wrap;margin-top:2px;
}
.tlog-stat{
  display:flex;align-items:center;gap:4px;font-size:10px;
  color:var(--text-dim);
}
.tlog-stat b{color:var(--text-secondary)}

/* ── Think MD content (LLM <think> rendered as markdown) ── */
.think-md-section{
  padding:8px 12px;border-top:1px solid rgba(240,165,0,.08);
  margin-top:4px;
}
.think-md-label{font-size:9.5px;color:var(--amber);opacity:.7;letter-spacing:.4px;
  text-transform:uppercase;margin-bottom:5px}
.think-md-content{
  font-size:12px;line-height:1.75;color:rgba(240,165,0,.75);
  white-space:pre-wrap;word-break:break-word;
}
.think-raw-stream{
  padding:8px 12px 0;font-size:11.5px;line-height:1.7;
  color:rgba(240,165,0,.7);white-space:pre-wrap;word-break:break-word;
}

/* AI text */
.ai-text{line-height:1.8;font-size:14px;color:var(--text-primary)}
.ai-text p{margin-bottom:9px}.ai-text p:last-child{margin-bottom:0}
.ai-text ul,.ai-text ol{margin:6px 0 9px 18px}
.ai-text li{margin-bottom:3px}
.ai-text code{
  font-family:var(--font-mono);font-size:12px;background:rgba(0,200,232,.09);
  color:var(--cyan);padding:2px 5px;border-radius:4px;
}
.ai-text pre{margin:9px 0;border-radius:9px;overflow:hidden;border:1px solid var(--border)}
.ai-text pre code{background:transparent;color:inherit;padding:0;font-size:12px}
.code-wrap{border-radius:9px;overflow:hidden;border:1px solid var(--border);margin:9px 0}
.code-hdr{
  display:flex;align-items:center;justify-content:space-between;padding:7px 12px;
  background:rgba(255,255,255,.025);border-bottom:1px solid var(--border);
  font-family:var(--font-mono);font-size:10.5px;color:var(--text-secondary);
}
.copy-btn{
  background:transparent;border:1px solid var(--border);color:var(--text-dim);
  padding:2px 8px;border-radius:4px;font-size:10px;cursor:pointer;
  font-family:var(--font-mono);transition:all .18s;
}
.copy-btn:hover{background:var(--bg-hover);color:var(--text-primary)}
.copy-btn.copied{border-color:var(--green);color:var(--green)}
.ai-text .hljs{padding:12px;background:transparent}
.ai-text h1,.ai-text h2,.ai-text h3{margin:12px 0 5px;font-weight:600}
.ai-text blockquote{border-left:2px solid var(--amber);padding-left:11px;color:var(--text-secondary);margin:7px 0}
.ai-text table{border-collapse:collapse;width:100%;margin:7px 0}
.ai-text th,.ai-text td{border:1px solid var(--border-accent);padding:5px 9px;font-size:12.5px}
.ai-text th{background:var(--bg-panel)}
.ai-text a{color:var(--cyan);text-decoration:none}
.ai-text a:hover{text-decoration:underline}

/* Tool card */
.tool-card{
  display:flex;align-items:flex-start;gap:9px;background:var(--violet-soft);
  border:1px solid rgba(167,139,250,.18);border-radius:9px;padding:9px 12px;
  font-family:var(--font-mono);font-size:12px;
}
.tool-icon{font-size:13px;flex-shrink:0;margin-top:1px}
.tool-name{color:var(--violet);font-weight:600;font-size:11px;letter-spacing:.3px;margin-bottom:2px}
.tool-preview{color:rgba(167,139,250,.55);font-size:10.5px;line-height:1.5;white-space:pre-wrap;word-break:break-word;max-height:70px;overflow:hidden}

/* Sandbox terminal */
.sb-terminal{background:#040710;border:1px solid rgba(0,224,110,.18);border-radius:9px;overflow:hidden;font-family:var(--font-mono);font-size:12px}
.term-hdr{display:flex;align-items:center;gap:9px;padding:7px 12px;background:rgba(0,224,110,.04);border-bottom:1px solid rgba(0,224,110,.1)}
.term-dots{display:flex;gap:4px}
.term-dot{width:7px;height:7px;border-radius:50%}
.term-dot:nth-child(1){background:#ff5f57}.term-dot:nth-child(2){background:#febc2e}.term-dot:nth-child(3){background:#28c840}
.term-title{font-size:10.5px;color:rgba(0,224,110,.5);letter-spacing:.3px;flex:1}
.term-status{font-size:10px;color:var(--green);display:flex;align-items:center;gap:4px}
.run-dot{width:5px;height:5px;border-radius:50%;background:var(--green);animation:pulse .8s infinite}
.term-body{padding:10px 12px;color:var(--green);line-height:1.6;white-space:pre-wrap;word-break:break-all;max-height:260px;overflow-y:auto;min-height:36px}
.term-body::-webkit-scrollbar{width:3px}
.term-body::-webkit-scrollbar-thumb{background:rgba(0,224,110,.25)}

/* User bubble */
.user-bubble{
  background:linear-gradient(135deg,#1c2848,#192040);border:1px solid rgba(77,145,255,.18);
  border-radius:11px 11px 4px 11px;padding:11px 14px;font-size:14px;line-height:1.65;
}

/* Cursor chính */
.cursor{display:inline-block;width:2px;height:.9em;background:var(--cyan);margin-left:1px;vertical-align:text-bottom;animation:blink .7s step-end infinite}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0}}

/* ━━ INPUT AREA ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ */
#input-area{padding:12px 20px 16px;background:var(--bg-base);border-top:1px solid var(--border);max-width:820px;margin:0 auto;width:100%}
.input-wrap{
  display:flex;gap:9px;background:var(--bg-input);border:1px solid var(--border-accent);
  border-radius:20px;padding:8px 8px 8px 16px;align-items:flex-end;
  transition:border-color .2s,box-shadow .2s;
}
.input-wrap:focus-within{border-color:rgba(240,165,0,.38);box-shadow:0 0 0 3px rgba(240,165,0,.07)}
#user-input{
  flex:1;background:transparent;border:none;outline:none;color:var(--text-primary);
  font-family:var(--font-ui);font-size:14px;line-height:1.6;resize:none;max-height:130px;padding:4px 0;
}
#user-input::placeholder{color:var(--text-dim)}
#send-btn{
  width:36px;height:36px;background:var(--amber);border:none;border-radius:50%;
  display:grid;place-items:center;cursor:pointer;color:#000;font-size:14px;flex-shrink:0;
  transition:all .2s;box-shadow:0 2px 10px var(--amber-glow);
}
#send-btn:hover{background:#ffb400;transform:scale(1.05)}
#send-btn:active{transform:scale(.95)}
#send-btn:disabled{opacity:.35;cursor:not-allowed;transform:none}
.info-bar{display:flex;justify-content:space-between;padding:4px 4px 0;font-size:10.5px;color:var(--text-dim);font-family:var(--font-mono)}

/* Historical session banner */
.hist-banner{
  text-align:center;padding:12px 16px;font-size:11.5px;font-family:var(--font-mono);
  color:var(--text-dim);background:rgba(240,165,0,.04);
  border-bottom:1px solid rgba(240,165,0,.1);
  display:flex;align-items:center;justify-content:center;gap:10px;flex-shrink:0;
}
.hist-banner button{
  background:var(--amber-soft);border:1px solid rgba(240,165,0,.3);color:var(--amber);
  border-radius:5px;padding:3px 10px;font-size:10.5px;font-family:var(--font-mono);cursor:pointer;
  transition:all .18s;
}
.hist-banner button:hover{background:var(--amber);color:#000}

/* Toast */
#toast{
  position:fixed;bottom:24px;left:50%;transform:translateX(-50%) translateY(12px);
  background:var(--bg-panel);border:1px solid var(--border-accent);border-radius:9px;
  padding:8px 16px;font-size:12px;color:var(--text-primary);
  box-shadow:0 8px 28px rgba(0,0,0,.5);opacity:0;transition:all .25s ease;
  pointer-events:none;z-index:200;font-family:var(--font-mono);
}
#toast.show{opacity:1;transform:translateX(-50%) translateY(0)}

/* Scroll to bottom btn */
#scroll-btn{
  position:absolute;bottom:110px;right:28px;width:34px;height:34px;
  background:var(--bg-panel);border:1px solid var(--border-accent);border-radius:50%;
  display:grid;place-items:center;cursor:pointer;color:var(--text-secondary);
  font-size:14px;transition:all .2s;opacity:0;pointer-events:none;z-index:5;box-shadow:0 4px 16px rgba(0,0,0,.4);
}
#scroll-btn.visible{opacity:1;pointer-events:auto}
#scroll-btn:hover{background:var(--amber);color:#000;border-color:var(--amber)}

/* Loading sessions */
.sessions-loading{
  display:flex;align-items:center;justify-content:center;padding:24px;
  color:var(--text-dim);font-size:12px;font-family:var(--font-mono);gap:8px;
}
.loading-spin{width:14px;height:14px;border:1.5px solid var(--border-accent);border-top-color:var(--amber);border-radius:50%;animation:spin .7s linear infinite}

/* Divider */
.turn-sep{
  max-width:820px;margin:0 auto;width:100%;padding:2px 20px;
}
.turn-sep hr{border:none;border-top:1px solid var(--border);margin:6px 0}
</style>
</head>
<body>

<!-- ━━ SIDEBAR ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<div id="sidebar">
  <div class="sb-top">
    <button class="new-chat-btn" onclick="newChat()">
      <svg width="14" height="14" viewBox="0 0 14 14" fill="none"><path d="M7 1v12M1 7h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/></svg>
      Cuộc trò chuyện mới
    </button>
    <div class="sb-search">
      <span class="sb-search-icon">⌕</span>
      <input id="session-search" type="text" placeholder="Tìm kiếm lịch sử..." oninput="filterSessions(this.value)">
    </div>
  </div>
  <div class="session-list" id="session-list">
    <div class="sessions-loading">
      <div class="loading-spin"></div>
      <span>Đang tải...</span>
    </div>
  </div>
  <div class="sb-footer">
    <div class="sb-history-badge">
      <div class="history-dot" id="history-dot"></div>
      <span id="history-lbl">Kiểm tra Weaviate...</span>
    </div>
  </div>
</div>

<!-- ━━ MAIN ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━ -->
<div id="main">
  <!-- Header -->
  <div id="header">
    <button class="sidebar-toggle" id="sidebar-toggle" onclick="toggleSidebar()" title="Ẩn/hiện sidebar">☰</button>
    <div class="logo">
      <div class="logo-icon">⚡</div>
      <div class="logo-text">AI <span>Agent</span></div>
    </div>
    <div class="session-title" id="session-title">Cuộc trò chuyện mới</div>
    <div class="spacer"></div>
    <div class="mode-group">
      <button class="mode-btn" data-mode="hybrid" onclick="setMode('hybrid')">hybrid</button>
      <button class="mode-btn" data-mode="on"     onclick="setMode('on')">rag</button>
      <button class="mode-btn" data-mode="off"    onclick="setMode('off')">web</button>
    </div>
    <button class="icon-btn danger" title="Xóa lịch sử phiên này" onclick="clearHistory()">🗑</button>
    <div class="ws-status">
      <div class="ws-dot connecting" id="ws-dot"></div>
      <span id="ws-lbl">kết nối</span>
    </div>
  </div>

  <!-- Chat -->
  <div id="chat-area" style="position:relative">
    <div id="hist-banner" style="display:none" class="hist-banner">
      <span>📖 Đang xem lịch sử · AI không có ngữ cảnh từ phiên này</span>
      <button onclick="continueSession()">Tiếp tục phiên này</button>
      <button onclick="newChat()">Chat mới</button>
    </div>
    <div id="messages">
      <div id="empty-state"></div>
    </div>
    <button id="scroll-btn" onclick="scrollBot(true)" title="Cuộn xuống">↓</button>
    <div id="input-area">
      <div class="input-wrap">
        <textarea id="user-input" rows="1" placeholder="Nhập tin nhắn... (Enter gửi · Shift+Enter xuống dòng)"></textarea>
        <button id="send-btn" onclick="sendMessage()">➤</button>
      </div>
      <div class="info-bar">
        <span id="model-lbl">Qwen3-32B · Groq</span>
        <span id="char-cnt">0 ký tự</span>
      </div>
    </div>
  </div>
</div>
<div id="toast"></div>

<script>
// ━━ CONFIG ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const WS_URL = `ws://${location.host}/ws/chat`;

// ━━ STATE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
let ws = null, isStreaming = false, reconnectTimer = null;
let curBubble = null, curThinkBlock = null, curThinkBody = null;
let curThinkLabel = null, curThinkSpinner = null, curTerminal = null;
let _thinkRawBuffer = '';
let currentSessionId = '';
let currentSessionName = '';
let currentTurnIndex = 0;
let isHistoricalView = false;
let allSessions =[];
let sidebarVisible = true;

// NEW: Biến phục vụ tối ưu logic stream thinking & reply
let curThinkCursor = null;
let renderTimer = null;

// ━━ SESSION MANAGEMENT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function generateUUID() {
  return 'xxxxxxxx-xxxx-4xxx-yxxx-xxxxxxxxxxxx'.replace(/[xy]/g, c => {
    const r = Math.random() * 16 | 0;
    return (c === 'x' ? r : (r & 0x3 | 0x8)).toString(16);
  });
}

function initNewSession() {
  currentSessionId = generateUUID();
  currentSessionName = '';
  currentTurnIndex = 0;
  isHistoricalView = false;
  updateSessionTitle('Cuộc trò chuyện mới');
  document.getElementById('hist-banner').style.display = 'none';
  renderEmptyState();
  highlightActiveSession(null);
}

function newChat() {
  if (isStreaming) return;
  send({ action: 'clear' });
  document.getElementById('messages').innerHTML = '';
  initNewSession();
  ta.focus();
  toast('✨ Cuộc trò chuyện mới');
}

function updateSessionTitle(name) {
  document.getElementById('session-title').textContent = name || 'Cuộc trò chuyện mới';
}

// ━━ SESSION API ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function loadSessions() {
  try {
    const r = await fetch('/sessions');
    const d = await r.json();
    allSessions = d.sessions ||[];
    const enabled = d.enabled !== false;
    updateHistoryStatus(enabled);
    renderSessions(allSessions);
  } catch (e) {
    updateHistoryStatus(false);
    document.getElementById('session-list').innerHTML =
      '<div class="sessions-loading" style="color:var(--red)">⚠ Không tải được lịch sử</div>';
  }
}

function updateHistoryStatus(enabled) {
  const dot = document.getElementById('history-dot');
  const lbl = document.getElementById('history-lbl');
  if (enabled) {
    dot.classList.add('active');
    lbl.textContent = 'Lịch sử lưu vào Weaviate';
  } else {
    dot.classList.remove('active');
    lbl.textContent = 'Weaviate không khả dụng';
  }
}

async function loadSession(sessionId) {
  if (isStreaming) return;
  try {
    const r = await fetch(`/sessions/${sessionId}/messages`);
    const d = await r.json();
    const msgs = d.messages ||[];
    if (!msgs.length) { toast('Phiên này không có tin nhắn'); return; }

    // Switch context
    send({ action: 'clear' });
    currentSessionId = sessionId;
    currentTurnIndex = msgs.filter(m => m.role === 'user').length;
    isHistoricalView = true;

    // Find session name
    const sess = allSessions.find(s => s.session_id === sessionId);
    const sname = sess ? sess.session_name : 'Phiên cũ';
    currentSessionName = sname;
    updateSessionTitle(sname);
    highlightActiveSession(sessionId);

    // Render historical messages
    const msgsEl = document.getElementById('messages');
    msgsEl.innerHTML = '';
    renderHistoricalMessages(msgs);

    // Show banner
    document.getElementById('hist-banner').style.display = 'flex';
    scrollBot(true);
    toast('📖 Đã tải phiên: ' + sname.slice(0, 30));
  } catch(e) {
    toast('⚠ Không tải được phiên: ' + e.message);
  }
}

function continueSession() {
  isHistoricalView = false;
  document.getElementById('hist-banner').style.display = 'none';
  // Tell WS about this session
  send({ action: 'set_session', session_id: currentSessionId, session_name: currentSessionName, turn_index: currentTurnIndex });
  toast('▶ Tiếp tục phiên – AI không có ngữ cảnh cũ');
  ta.focus();
}

async function deleteSession(sessionId, e) {
  e && e.stopPropagation();
  if (!confirm('Xóa phiên này?')) return;
  try {
    await fetch(`/sessions/${sessionId}`, { method: 'DELETE' });
    if (currentSessionId === sessionId) newChat();
    allSessions = allSessions.filter(s => s.session_id !== sessionId);
    renderSessions(allSessions);
    toast('🗑 Đã xóa phiên');
  } catch(e) {
    toast('⚠ Không xóa được phiên');
  }
}

function filterSessions(q) {
  q = q.toLowerCase();
  const filtered = q ? allSessions.filter(s =>
    (s.session_name || '').toLowerCase().includes(q)
  ) : allSessions;
  renderSessions(filtered);
}

// ━━ SESSION RENDERING ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function relativeTime(isoStr) {
  if (!isoStr) return '';
  const d = new Date(isoStr);
  const now = new Date();
  const diff = (now - d) / 1000;
  if (diff < 60)   return 'Vừa xong';
  if (diff < 3600) return `${Math.floor(diff/60)} phút trước`;
  if (diff < 86400) return `${Math.floor(diff/3600)} giờ trước`;
  if (diff < 172800) return 'Hôm qua';
  if (diff < 604800) return `${Math.floor(diff/86400)} ngày trước`;
  return d.toLocaleDateString('vi-VN');
}

function groupByDate(sessions) {
  const groups = { 'Hôm nay': [], 'Hôm qua':[], 'Tuần này': [], 'Cũ hơn':[] };
  const now = new Date();
  sessions.forEach(s => {
    const d = new Date(s.last_timestamp || 0);
    const diffDays = Math.floor((now - d) / 86400000);
    if (diffDays === 0)       groups['Hôm nay'].push(s);
    else if (diffDays === 1)  groups['Hôm qua'].push(s);
    else if (diffDays <= 7)   groups['Tuần này'].push(s);
    else                      groups['Cũ hơn'].push(s);
  });
  return groups;
}

function renderSessions(sessions) {
  const el = document.getElementById('session-list');
  if (!sessions.length) {
    el.innerHTML = '<div class="sessions-loading" style="opacity:.5">Chưa có lịch sử chat</div>';
    return;
  }
  const groups = groupByDate(sessions);
  let html = '';
  for (const [label, items] of Object.entries(groups)) {
    if (!items.length) continue;
    html += `<div class="date-label">${label}</div>`;
    items.forEach(s => {
      const active = s.session_id === currentSessionId ? ' active' : '';
      const name = esc(s.session_name || 'Cuộc trò chuyện');
      const time = relativeTime(s.last_timestamp);
      const count = s.message_count || '';
      html += `
        <div class="session-item${active}" data-id="${s.session_id}" onclick="loadSession('${s.session_id}')">
          <span class="si-icon">💬</span>
          <div class="si-info">
            <div class="si-name">${name}</div>
            <div class="si-meta">${time}${count ? ' · ' + count + ' tin' : ''}</div>
          </div>
          <button class="si-del" onclick="deleteSession('${s.session_id}', event)" title="Xóa">✕</button>
        </div>`;
    });
  }
  el.innerHTML = html;
}

function highlightActiveSession(sessionId) {
  document.querySelectorAll('.session-item').forEach(el => {
    el.classList.toggle('active', el.dataset.id === sessionId);
  });
}

// Render historical messages (static, no streaming)
function renderHistoricalMessages(msgs) {
  const msgsEl = document.getElementById('messages');
  // Group into turns: user msg followed by assistant msg
  msgs.forEach((m, i) => {
    const ts = m.timestamp ? new Date(m.timestamp).toLocaleTimeString('vi-VN', {hour:'2-digit',minute:'2-digit'}) : '';
    if (m.role === 'user') {
      const row = document.createElement('div');
      row.className = 'msg-row user historical';
      row.innerHTML = `
        <div class="avatar user">👤</div>
        <div class="bubble">
          <div class="user-bubble">${esc(m.content).replace(/\n/g,'<br>')}</div>
          <div class="msg-actions">
            <span class="msg-ts">${ts}</span>
            <button class="act-btn" onclick="copyText(this,'${escAttr(m.content)}')">⎘ Sao chép</button>
          </div>
        </div>`;
      msgsEl.appendChild(row);
    } else if (m.role === 'assistant') {
      const row = document.createElement('div');
      row.className = 'msg-row ai historical';
      const bubble = document.createElement('div');
      bubble.className = 'bubble';
      const aiText = document.createElement('div');
      aiText.className = 'ai-text';
      renderMarkdown(aiText, m.content, false);
      bubble.appendChild(aiText);
      // Actions
      const acts = document.createElement('div');
      acts.className = 'msg-actions';
      acts.innerHTML = `
        <span class="msg-ts">${ts}</span>
        <button class="act-btn" onclick="copyBubbleText(this)">⎘ Sao chép</button>`;
      bubble.appendChild(acts);
      row.innerHTML = `<div class="avatar ai">⚡</div>`;
      row.appendChild(bubble);
      msgsEl.appendChild(row);

      // Separator
      if (i < msgs.length - 1) {
        const sep = document.createElement('div');
        sep.className = 'turn-sep';
        sep.innerHTML = '<hr>';
        msgsEl.appendChild(sep);
      }
    }
  });
}

// ━━ WEBSOCKET ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function connect() {
  if (ws && ws.readyState <= 1) return;
  setWs('connecting');
  ws = new WebSocket(WS_URL);
  ws.onopen = () => { setWs('connected'); clearTimeout(reconnectTimer); };
  ws.onclose = () => { setWs('off'); reconnectTimer = setTimeout(connect, 3000); };
  ws.onerror = () => ws.close();
  ws.onmessage = (ev) => { try { handle(JSON.parse(ev.data)); } catch(e) { console.error(e); } };
}

function setWs(s) {
  const dot = document.getElementById('ws-dot'), lbl = document.getElementById('ws-lbl');
  dot.className = 'ws-dot' + (s==='connected' ? ' connected' : s==='connecting' ? ' connecting' : '');
  lbl.textContent = s==='connected' ? 'online' : s==='connecting' ? 'kết nối...' : 'mất kết nối';
}

function send(o) {
  if (ws && ws.readyState === WebSocket.OPEN) { ws.send(JSON.stringify(o)); return true; }
  toast('⚠️ Chưa kết nối WS'); return false;
}

// ━━ MESSAGE HANDLER ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function handle(m) {
  switch (m.type) {
    case 'start': {
      removeEmptyState();
      isHistoricalView = false;
      document.getElementById('hist-banner').style.display = 'none';
      const row = addAIRow();
      curThinkBlock = addThinkBlock(row);
      curThinkBody = curThinkBlock.querySelector('.think-body');
      curThinkLabel = curThinkBlock.querySelector('.think-label');
      curThinkSpinner = curThinkBlock.querySelector('.think-spinner');
      // Cursor sẽ được thêm vào khi có thinking_token đầu tiên
      curThinkCursor = null;
      _thinkRawBuffer = '';

      curBubble = document.createElement('div');
      curBubble.className = 'ai-text';
      curBubble._raw = '';
      row.querySelector('.bubble').appendChild(curBubble);
      curTerminal = null;
      break;
    }

    case 'thinking_log': {
      // Structured agent trace — thêm vào trace section
      addThinkLog(curThinkBlock, m.event, m.data || {});
      // Cập nhật label
      if (curThinkLabel && m.event !== 'AGENT_END') {
        const icons = {AGENT_START:'▶',LLM_METRIC:'📊',TOOL_CALL:'⚙',AGENT_END:'✓'};
        curThinkLabel.innerHTML = `${icons[m.event]||'·'} ${esc(m.event.replace(/_/g,' '))} <span style="opacity:.6">· nhấn để xem</span>`;
      }
      break;
    }

    case 'thinking_token': {
      if (!curThinkBody) break;
      _thinkRawBuffer += m.content;

      // Lazy-create think-md-section khi lần đầu nhận token
      let mdSection = curThinkBlock.querySelector('.think-md-section');
      if (!mdSection) {
        mdSection = document.createElement('div');
        mdSection.className = 'think-md-section';
        mdSection.innerHTML = `<div class="think-md-label">💭 Chuỗi suy nghĩ</div>
          <div class="think-raw-stream"></div>`;
        curThinkBody.appendChild(mdSection);
        // cursor
        curThinkCursor = document.createElement('span');
        curThinkCursor.className = 'think-cursor';
        mdSection.querySelector('.think-raw-stream').appendChild(curThinkCursor);
      }
      const stream = mdSection.querySelector('.think-raw-stream');
      const textNode = document.createTextNode(m.content);
      stream.insertBefore(textNode, curThinkCursor);
      stream.scrollTop = stream.scrollHeight;
      // Update label
      if (curThinkLabel) {
        curThinkLabel.innerHTML = `💭 Đang suy nghĩ <span style="opacity:.6">· ${_thinkRawBuffer.length.toLocaleString()} ký tự</span>`;
      }
      break;
    }

    case 'thinking_done': {
      // Render markdown cho phần raw <think>
      if (curThinkBlock && _thinkRawBuffer) {
        const mdSection = curThinkBlock.querySelector('.think-md-section');
        if (mdSection) {
          const stream = mdSection.querySelector('.think-raw-stream');
          // Replace raw stream text with rendered markdown
          stream.innerHTML = '';
          const mdDiv = document.createElement('div');
          mdDiv.className = 'think-md-content';
          mdDiv.innerHTML = marked.parse(_thinkRawBuffer);
          stream.appendChild(mdDiv);
        }
      }
      // Dọn cursor
      if (curThinkCursor) { curThinkCursor.remove(); curThinkCursor = null; }
      // Collapse & update label
      if (curThinkBlock) {
        curThinkBlock.classList.add('collapsed');
        if (curThinkSpinner) curThinkSpinner.classList.add('done');
        const totalLen = _thinkRawBuffer.length;
        if (curThinkLabel) {
          curThinkLabel.innerHTML = `✓ Đã suy nghĩ <span style="opacity:.6">· ${totalLen.toLocaleString()} ký tự · nhấn để xem</span>`;
        }
      }
      _thinkRawBuffer = '';
      break;
    }

    case 'token': {
      if (!curBubble) break;
      curTerminal = null;
      curBubble._raw += m.content;

      // Kỹ thuật Debounce giúp Stream mượt mà hơn và tiết kiệm CPU
      clearTimeout(renderTimer);
      renderTimer = setTimeout(() => {
        if (curBubble) {
          renderMarkdown(curBubble, curBubble._raw, true);
          scrollBotIfNear();
        }
      }, 40);
      break;
    }

    case 'tool': {
      if (!curBubble) break;
      clearTimeout(renderTimer); // Dừng stream UI để cập nhật đồng bộ
      if (curBubble._raw) renderMarkdown(curBubble, curBubble._raw, false);
      addToolCard(curBubble.closest('.bubble'), m.tool, m.content);
      curTerminal = null;
      scrollBotIfNear();
      break;
    }

    case 'sandbox_output': {
      if (!curTerminal) {
        const b = curBubble?.closest('.bubble');
        if (!b) break;
        curTerminal = addTerminal(b);
      }
      curTerminal.textContent += m.content;
      curTerminal.scrollTop = curTerminal.scrollHeight;
      scrollBotIfNear();
      break;
    }

    case 'done': {
      clearTimeout(renderTimer);
      const finalText = curBubble?._raw || m.content || '';
      if (curBubble) {
        renderMarkdown(curBubble, finalText, false);
        // Add actions bar to AI bubble
        addMsgActions(curBubble.closest('.bubble'), finalText);
        curBubble = null;
      }
      if (curThinkSpinner) curThinkSpinner.classList.add('done');
      if (curThinkCursor) {
        curThinkCursor.remove();
        curThinkCursor = null;
      }
      if (curTerminal) {
        const st = curTerminal.closest('.sb-terminal')?.querySelector('.term-status');
        if (st) st.innerHTML = '<span style="color:var(--green)">✓ hoàn thành</span>';
      }
      currentTurnIndex = (m.turn_index !== undefined) ? m.turn_index : currentTurnIndex + 1;
      setStreaming(false);
      scrollBot(true);
      // Reload sidebar to show updated session
      setTimeout(() => loadSessions(), 800);
      break;
    }

    case 'error': { addErrMsg(m.content); setStreaming(false); break; }
    case 'system': { addSysMsg(m.content); break; }
    case 'mode':   { updateModeUI(m.content); break; }
  }
}

// ━━ UI BUILDERS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function removeEmptyState() {
  document.getElementById('empty-state')?.remove();
}

function renderEmptyState() {
  const msgs = document.getElementById('messages');
  msgs.innerHTML = '';
  const el = document.createElement('div');
  el.id = 'empty-state';
  const suggestions =[
    '📋 Tóm tắt một file tài liệu',
    '🔍 Tìm kiếm thông tin trên web',
    '💻 Viết và chạy code Python',
    '🖥️ Điều khiển ứng dụng máy tính',
  ];
  el.innerHTML = `
    <div class="es-icon">⚡</div>
    <div class="es-title">AI Agent</div>
    <div class="es-sub">Hỏi bất cứ điều gì, chạy code, điều khiển máy tính, tìm kiếm web hoặc tài liệu nội bộ.</div>
    <div class="es-chips">
      ${suggestions.map(s => `<div class="es-chip" onclick="fillInput('${s.replace(/'/g,"\\'")}')">${s}</div>`).join('')}
    </div>`;
  msgs.appendChild(el);
}

function fillInput(text) {
  ta.value = text;
  ta.dispatchEvent(new Event('input'));
  ta.focus();
}

function addAIRow() {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = `<div class="avatar ai">⚡</div><div class="bubble"></div>`;
  document.getElementById('messages').appendChild(row);
  return row;
}

function addThinkBlock(row) {
  const b = document.createElement('div');
  b.className = 'think-block';
  b.innerHTML = `
    <div class="think-header" onclick="toggleThink(this)">
      <div class="think-spinner"></div>
      <span class="think-label">Đang suy nghĩ...</span>
      <span class="think-chevron">▼</span>
    </div>
    <div class="think-body">
      <div class="tlog-section"></div>
    </div>`;
  row.querySelector('.bubble').appendChild(b);
  return b;
}

function toggleThink(h) { h.closest('.think-block').classList.toggle('collapsed'); }

// ── Thêm 1 thinking_log entry vào trace ──────────────────────
function addThinkLog(thinkBlock, event, data) {
  if (!thinkBlock) return;
  const section = thinkBlock.querySelector('.tlog-section');
  if (!section) return;
  const entry = document.createElement('div');
  entry.className = 'tlog-entry';

  switch(event) {
    case 'AGENT_START':
      entry.innerHTML = `
        <span class="tlog-badge start">▶ START</span>
        <div class="tlog-body">
          <div class="tlog-title">Agent bắt đầu xử lý</div>
          <div class="tlog-meta">Mode: <b>${esc(data.mode||'hybrid')}</b></div>
          ${data.input_preview ? `<div class="tlog-preview">${esc(data.input_preview)}</div>` : ''}
        </div>`;
      break;

    case 'LLM_METRIC':
      entry.innerHTML = `
        <span class="tlog-badge metric">📊 LLM</span>
        <div class="tlog-body">
          <div class="tlog-stats">
            <div class="tlog-stat">🔤 Prompt: <b>${(data.prompt_tokens||0).toLocaleString()}</b></div>
            <div class="tlog-stat">✍️ Output: <b>${(data.completion_tokens||0).toLocaleString()}</b></div>
            <div class="tlog-stat">∑ Total: <b>${(data.total_tokens||0).toLocaleString()}</b></div>
            <div class="tlog-stat">⏱ <b>${(data.latency_ms||0).toLocaleString()}ms</b></div>
          </div>
        </div>`;
      break;

    case 'TOOL_CALL': {
      const icon = TOOL_ICONS[data.tool] || '🔧';
      entry.innerHTML = `
        <span class="tlog-badge tool">${icon} TOOL</span>
        <div class="tlog-body">
          <div class="tlog-title">${esc(data.tool)} <span style="opacity:.5;font-weight:400">· bước ${data.step||'?'}</span></div>
          ${data.result_preview ? `<div class="tlog-preview">${esc(data.result_preview)}</div>` : ''}
        </div>`;
      break;
    }

    case 'AGENT_END':
      entry.innerHTML = `
        <span class="tlog-badge end">✓ END</span>
        <div class="tlog-body">
          <div class="tlog-stats">
            <div class="tlog-stat">🔁 Bước: <b>${data.steps||0}</b></div>
            <div class="tlog-stat">⏱ <b>${(data.elapsed_ms||0).toLocaleString()}ms</b></div>
            ${data.total_tokens ? `<div class="tlog-stat">🔤 Tokens: <b>${data.total_tokens.toLocaleString()}</b></div>` : ''}
          </div>
        </div>`;
      break;

    default:
      entry.innerHTML = `<span class="tlog-badge metric">${esc(event)}</span>
        <div class="tlog-body"><div class="tlog-meta">${esc(JSON.stringify(data))}</div></div>`;
  }
  section.appendChild(entry);
  // Scroll think body
  const body = thinkBlock.querySelector('.think-body');
  if(body) body.scrollTop = body.scrollHeight;
}

const TOOL_ICONS = {
  run_code_in_sandbox:'⚙️', start_background_task:'🚀', stop_background_task:'⏹️',
  read_task_log:'📋', install_packages:'📦', list_workspace:'📁',
  web_search:'🔍', search_knowledge_base:'📚', search_chat_history:'🗂️',
  control_volume:'🔊', open_application:'🖥️', get_system_info:'💻',
  control_brightness:'☀️', take_screenshot:'📸', power_control:'⚡',
  manage_process:'⚙️', clipboard_control:'📋', get_network_info:'🌐',
};

function addToolCard(bubble, name, preview) {
  const icon = TOOL_ICONS[name] || '🔧';
  const c = document.createElement('div');
  c.className = 'tool-card';
  const prev = preview ? String(preview).slice(0, 200) : '';
  c.innerHTML = `<div class="tool-icon">${icon}</div><div>
    <div class="tool-name">${esc(name)}</div>
    ${prev ? `<div class="tool-preview">${esc(prev)}</div>` : ''}
  </div>`;
  bubble.appendChild(c);
}

function addTerminal(bubble) {
  const w = document.createElement('div');
  w.className = 'sb-terminal';
  w.innerHTML = `<div class="term-hdr">
    <div class="term-dots"><div class="term-dot"></div><div class="term-dot"></div><div class="term-dot"></div></div>
    <span class="term-title">sandbox · ~/agent_workspace</span>
    <div class="term-status"><div class="run-dot"></div> running</div>
  </div><div class="term-body"></div>`;
  bubble.appendChild(w);
  return w.querySelector('.term-body');
}

function addMsgActions(bubble, rawText) {
  if (!bubble) return;
  const existing = bubble.querySelector('.msg-actions');
  if (existing) existing.remove();
  const acts = document.createElement('div');
  acts.className = 'msg-actions';
  const safeText = escAttr(rawText);
  acts.innerHTML = `
    <button class="act-btn" onclick="copyBubbleText(this)">⎘ Sao chép</button>`;
  bubble.appendChild(acts);
}

function addErrMsg(txt) {
  const row = document.createElement('div');
  row.className = 'msg-row ai';
  row.innerHTML = `<div class="avatar ai">⚡</div><div class="bubble">
    <div style="background:var(--red-soft);border:1px solid rgba(255,77,94,.22);border-radius:9px;
    padding:10px 12px;font-family:var(--font-mono);font-size:12px;color:var(--red)">❌ ${esc(txt)}</div>
  </div>`;
  document.getElementById('messages').appendChild(row);
  scrollBot(true);
}

function addSysMsg(txt) {
  const el = document.createElement('div');
  el.style.cssText = 'text-align:center;padding:7px;font-size:10.5px;color:var(--text-dim);font-family:var(--font-mono)';
  el.textContent = txt;
  document.getElementById('messages').appendChild(el);
}

// ━━ MARKDOWN RENDERING ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
marked.setOptions({ breaks: true, gfm: true });

function renderMarkdown(el, raw, streaming) {
  if (!raw && !streaming) return;
  let html = marked.parse(raw || '');
  html = html.replace(/<pre><code(?: class="language-([^"]*)")?>([\s\S]*?)<\/code><\/pre>/g, (_, lang, code) => {
    const l = lang || 'text';
    return `<div class="code-wrap"><div class="code-hdr"><span>${l}</span>
      <button class="copy-btn" onclick="copyCode(this)">copy</button></div>
      <pre><code class="${lang ? 'language-' + lang : ''}">${code}</code></pre></div>`;
  });
  el.innerHTML = html + (streaming ? '<span class="cursor"></span>' : '');
  el.querySelectorAll('pre code').forEach(b => hljs.highlightElement(b));
}

// Alias
function renderBubble(el, raw, streaming) { renderMarkdown(el, raw, streaming); }

function copyCode(btn) {
  const code = btn.closest('.code-wrap').querySelector('code');
  navigator.clipboard.writeText(code.innerText).then(() => {
    btn.textContent = '✓'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = 'copy'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyBubbleText(btn) {
  const ai = btn.closest('.bubble')?.querySelector('.ai-text');
  const text = ai ? ai.innerText : '';
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Đã sao chép'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '⎘ Sao chép'; btn.classList.remove('copied'); }, 2000);
  });
}

function copyText(btn, text) {
  navigator.clipboard.writeText(text).then(() => {
    btn.textContent = '✓ Đã sao chép'; btn.classList.add('copied');
    setTimeout(() => { btn.textContent = '⎘ Sao chép'; btn.classList.remove('copied'); }, 2000);
  });
}

// ━━ INPUT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const ta = document.getElementById('user-input');
const sb = document.getElementById('send-btn');
const cc = document.getElementById('char-cnt');

ta.addEventListener('input', () => {
  ta.style.height = 'auto';
  ta.style.height = Math.min(ta.scrollHeight, 130) + 'px';
  cc.textContent = ta.value.length + ' ký tự';
});

ta.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
});

function sendMessage() {
  const text = ta.value.trim();
  if (!text || isStreaming) return;

  // Set session name from first message
  if (!currentSessionName) {
    currentSessionName = text.slice(0, 60);
    updateSessionTitle(currentSessionName);
    highlightActiveSession(currentSessionId);
  }

  // Send via WS with session info
  if (!send({
    action: 'chat',
    message: text,
    session_id: currentSessionId,
    session_name: currentSessionName,
  })) return;

  removeEmptyState();

  // Add user message to DOM
  const row = document.createElement('div');
  row.className = 'msg-row user';
  const ts = new Date().toLocaleTimeString('vi-VN', { hour: '2-digit', minute: '2-digit' });
  row.innerHTML = `
    <div class="avatar user">👤</div>
    <div class="bubble">
      <div class="user-bubble">${esc(text).replace(/\n/g, '<br>')}</div>
      <div class="msg-actions">
        <span class="msg-ts">${ts}</span>
        <button class="act-btn" onclick="copyText(this,\`${escAttr(text)}\`)">⎘ Sao chép</button>
      </div>
    </div>`;
  document.getElementById('messages').appendChild(row);

  scrollBot(true);
  ta.value = '';
  ta.style.height = 'auto';
  cc.textContent = '0 ký tự';
  setStreaming(true);
}

function setStreaming(v) {
  isStreaming = v;
  sb.disabled = v;
  ta.disabled = v;
  if (!v) {
    ta.focus();
    curBubble = null; curThinkBlock = null; curThinkBody = null;
    curThinkLabel = null; curThinkSpinner = null; curTerminal = null;
    curThinkCursor = null;
  }
}

function clearHistory() {
  if (isStreaming) return;
  if (!confirm('Xóa lịch sử phiên này?')) return;
  send({ action: 'clear' });
  document.getElementById('messages').innerHTML = '';
  currentTurnIndex = 0;
  renderEmptyState();
  toast('🗑 Đã xóa lịch sử phiên');
}

// ━━ MODE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function setMode(m) { send({ action: 'mode', mode: m }); updateModeUI(m); toast(`Chế độ: ${m}`); }
function updateModeUI(m) {
  document.querySelectorAll('.mode-btn').forEach(b => b.classList.toggle('active', b.dataset.mode === m));
}

// ━━ SIDEBAR TOGGLE ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function toggleSidebar() {
  const sb = document.getElementById('sidebar');
  sidebarVisible = !sidebarVisible;
  sb.classList.toggle('collapsed', !sidebarVisible);
  localStorage.setItem('sidebar_visible', sidebarVisible ? '1' : '0');
}

// ━━ SCROLL ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const msgsEl = document.getElementById('messages');
const scrollBtn = document.getElementById('scroll-btn');

function scrollBot(force = false) {
  requestAnimationFrame(() => {
    msgsEl.scrollTop = msgsEl.scrollHeight;
  });
}

function scrollBotIfNear() {
  const threshold = 200;
  const distFromBottom = msgsEl.scrollHeight - msgsEl.scrollTop - msgsEl.clientHeight;
  if (distFromBottom < threshold) scrollBot();
}

msgsEl.addEventListener('scroll', () => {
  const distFromBottom = msgsEl.scrollHeight - msgsEl.scrollTop - msgsEl.clientHeight;
  scrollBtn.classList.toggle('visible', distFromBottom > 300);
});

// ━━ UTILS ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
function esc(s) {
  return String(s)
    .replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
function escAttr(s) {
  return String(s).replace(/\\/g,'\\\\').replace(/`/g,'\\`').replace(/'/g,"\\'").replace(/"/g,'\\"');
}

let toastTm;
function toast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTm);
  toastTm = setTimeout(() => el.classList.remove('show'), 2600);
}

// ━━ INIT ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
(function init() {
  // Restore sidebar state
  const savedSidebar = localStorage.getItem('sidebar_visible');
  if (savedSidebar === '0') {
    sidebarVisible = false;
    document.getElementById('sidebar').classList.add('collapsed');
  }

  // Init session
  initNewSession();

  // Empty state
  renderEmptyState();

  // Connect WS + fetch mode + load sessions
  connect();
  ta.focus();

  fetch('/mode').then(r => r.json()).then(d => updateModeUI(d.mode)).catch(() => {});
  loadSessions();

  // Check health for history status
  fetch('/health').then(r => r.json()).then(d => {
    updateHistoryStatus(d.history_enabled !== false);
  }).catch(() => {});
})();
</script>
